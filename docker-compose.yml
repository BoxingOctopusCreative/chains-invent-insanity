# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json
#
# Production: API and UI are routed by Traefik (or another reverse proxy) to the published container ports;
# they expose GET /health for Docker and can be used for Traefik health checks the same way.
# The optional `nginx` service below is for local all-in-one demos (single host on :80), not production.

---

volumes:
  print-cache-data:

services:
  api:
    image: ghcr.io/boxingoctopuscreative/chains-invent-insanity/api:latest
    environment:
      - APP_ENV=dev
      - DEBUG_MODE=True
      - APP_KEY=a1b2c3d4
      - PORT=8000
      - USE_LOCAL_WORDLIST=True
      - LOCAL_QUESTION_WORDLIST=/app/assets/questions.txt
      - LOCAL_ANSWER_WORDLIST=/app/assets/answers.txt
      - REMOTE_QUESTION_WORDLIST=https://ci2-assets.chainsinventinsanity.lol/questions.txt
      - REMOTE_ANSWER_WORDLIST=https://ci2-assets.chainsinventinsanity.lol/answers.txt
      - PRINT_CACHE_DIR=/app/print_cache
    volumes:
      - print-cache-data:/app/print_cache
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5); sys.exit(0 if r.status == 200 else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Removes PDFs older than PRINT_CACHE_MAX_AGE_* from the shared volume and (when configured) from S3.
  # Mirror the same PRINT_CACHE_S3_* / AWS_* vars as `api` if you use S3 mirroring.
  print-cache-cleanup:
    image: ghcr.io/boxingoctopuscreative/chains-invent-insanity/api:latest
    command: ["python", "print_cache_cleanup.py"]
    environment:
      PYTHONUNBUFFERED: "1"
      PRINT_CACHE_DIR: /app/print_cache
      PRINT_CACHE_MAX_AGE_HOURS: "24"
      PRINT_CACHE_CLEANUP_INTERVAL_SECONDS: "3600"
    volumes:
      - print-cache-data:/app/print_cache
    depends_on:
      api:
        condition: service_healthy

  # Browser loads the spec from the host (localhost:8000), not from the Docker network.
  swagger-ui:
    image: swaggerapi/swagger-ui:v5.17.14
    depends_on:
      - api
    ports:
      - "8080:8080"
    environment:
      # Fetched by the browser; use your public API URL in production.
      URL: http://localhost:8000/openapi.yaml

  ui:
    image: ghcr.io/boxingoctopuscreative/chains-invent-insanity/ui:latest
    # Client bundle is built with APP_ENV; set at image build time (see ui/Dockerfile), not here.
    environment:
      - APP_ENV=dev
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/health',(r)=>{r.resume();process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      api:
        condition: service_healthy

  # Local reverse proxy only — production uses Traefik in front of `api` and `ui`.
  nginx:
    image: nginx:1.21.4-alpine
    links:
      - ui
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/config/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/config/default.conf:/etc/nginx/conf.d/default.conf
