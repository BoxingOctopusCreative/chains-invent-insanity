# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# Build and publish API and UI images to GitHub Container Registry (ghcr.io).
# Container scanning: add repository secret SNYK_TOKEN (https://docs.snyk.io/snyk-api-info/authentication-for-api).
# SARIF uploads require security-events: write and Code scanning enabled (Settings → Code security).
name: Container images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  actions: write
  security-events: write

concurrency:
  group: containers-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install and test API
        working-directory: api
        run: |
          python -m pip install -r requirements.txt pytest
          python -m pytest tests/ -q

  test-ui:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install and test UI
        working-directory: ui
        run: |
          npm ci
          npm run lint
          npm run typecheck

  build-and-push:
    needs:
      - test-api
      - test-ui
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: ./api
            file: ./api/Dockerfile
          - name: ui
            context: ./ui
            file: ./ui/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image for Snyk
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          load: true
          tags: ${{ matrix.name }}:scan
          platforms: linux/amd64
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      # Use `snyk container test` (current CLI) instead of snyk/actions/docker, which still invokes `snyk test --docker`
      # and can fail or omit SARIF with newer Snyk CLI images.
      #
      # Exit codes (snyk container test): 0 = success, no issues; 1 = scan ok, vulnerabilities found; 2+ = scan error.
      # We only fail the job on 2+ so CI stays green when findings exist (SARIF still uploads to the Security tab).
      - name: Snyk Container scan
        id: snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          set +e
          docker run --rm \
            -e SNYK_TOKEN \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -v /var/run/docker.sock:/var/run/docker.sock \
            snyk/snyk:docker \
            container test "${{ matrix.name }}:scan" \
            --file="${{ matrix.file }}" \
            --severity-threshold=high \
            --sarif-file-output="snyk-${{ matrix.name }}.sarif"
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -eq 1 ]; then
            echo "::notice::Snyk found vulnerabilities (exit 1). SARIF written; job will not fail on findings only."
          elif [ "$code" -ne 0 ]; then
            echo "::error::Snyk scan failed with exit code $code"
          fi
          exit 0

      - name: Upload Snyk SARIF to GitHub Code Scanning
        if: always() && steps.snyk.outcome != 'skipped' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: snyk-${{ matrix.name }}.sarif
          category: snyk-container-${{ matrix.name }}

      - name: Fail if Snyk scan errored
        if: steps.snyk.outputs.exit_code != '0' && steps.snyk.outputs.exit_code != '1'
        run: exit 1

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
