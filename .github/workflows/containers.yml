# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# Build and publish API and UI images to GitHub Container Registry (ghcr.io).
#
# Versioning: on push to main (e.g. after merging a PR), the release-tag job bumps a v* semver tag (default bump: patch).
# Put #major, #minor, or #patch in a merge commit message to choose the bump; see anothrNick/github-tag-action.
# Images are tagged with that version (plus latest, major.minor, sha). A push of v* tags also builds (manual releases).
#
# Trivy scans the built image and uploads SARIF to Code scanning (Security tab); requires security-events: write and
# Code scanning enabled (Settings → Code security).
name: Container images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  actions: write
  security-events: write

concurrency:
  group: containers-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install and test API
        working-directory: api
        run: |
          python -m pip install -r requirements.txt pytest
          python -m pytest tests/ -q

  test-ui:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install and test UI
        working-directory: ui
        run: |
          npm ci
          npm run lint
          npm run typecheck

  # Creates the next v* tag on main after tests pass. Skipped on PRs and on tag pushes (so manual v* builds still work).
  release-tag:
    runs-on: ubuntu-latest
    needs:
      - test-api
      - test-ui
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bump and push semver tag
        id: tag
        uses: anothrNick/github-tag-action@1.75.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch
          RELEASE_BRANCHES: main
          INITIAL_VERSION: v0.1.0

  build-and-push:
    needs:
      - test-api
      - test-ui
      - release-tag
    if: |
      always() &&
      needs.test-api.result == 'success' &&
      needs.test-ui.result == 'success' &&
      (needs.release-tag.result == 'skipped' || needs.release-tag.result == 'success')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: ./api
            file: ./api/Dockerfile
          - name: ui
            context: ./ui
            file: ./ui/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image for Trivy
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          load: true
          tags: ${{ matrix.name }}:scan
          platforms: linux/amd64
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      # exit-code 0: always succeed this step when the scan runs so SARIF is produced; findings still appear in SARIF.
      # Use exit-code 1 on this step if you want the job to fail when HIGH/CRITICAL issues exist.
      - name: Trivy vulnerability scan
        id: trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: image
          image-ref: ${{ matrix.name }}:scan
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"
          hide-progress: true

      - name: Upload Trivy SARIF to GitHub Code Scanning
        if: always() && steps.trivy.outcome != 'skipped' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-container-${{ matrix.name }}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # When release-tag ran, pretend GITHUB_REF is the new tag so semver + major.minor tags resolve for ghcr.io.
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        env:
          GITHUB_REF: ${{ needs.release-tag.result == 'success' && needs.release-tag.outputs.new_tag != '' && format('refs/tags/{0}', needs.release-tag.outputs.new_tag) || github.ref }}
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable=${{ (github.ref == 'refs/heads/main' && needs.release-tag.result == 'success') || (startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
